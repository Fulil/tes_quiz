<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Quiz Multiplayer Firebase</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
  margin: auto;
}

button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
}
.hidden { display:none; }
</style>
</head>

<body>

<h1>🎮 Quiz Multiplayer</h1>

<div class="card" id="lobby">
  <input id="nama" placeholder="Nama kamu"><br>
  <button onclick="join()">Masuk</button>
  <h3>👥 Pemain:</h3>
  <ul id="players"></ul>
  <button onclick="startGame()">Mulai</button>
</div>

<div class="card hidden" id="game">
  <p>⏳ <span id="time">10</span></p>
  <h3 id="pertanyaan"></h3>
  <div id="jawaban"></div>
</div>

<div class="card hidden" id="hasil">
  <h2>🏆 Ranking</h2>
  <ul id="ranking"></ul>

  <div id="hadiah" class="hidden">
    <h3>🎉 Kamu Juara 1</h3>
    <a href="https://link.dana.id/yourlink" target="_blank">
      <button>Ambil DANA</button>
    </a>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCA3rfNngCSAaqG_LMm86RuUEnQPHAGlvs",
  authDomain: "tess-cef03.firebaseapp.com",
  databaseURL: "https://tess-cef03-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "tess-cef03",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let nama = "";
let score = 0;
let index = 0;

const quiz = [
  {q:"Ibukota Indonesia?", a:["Jakarta","Bandung"], benar:"Jakarta"},
  {q:"2+2?", a:["3","4"], benar:"4"},
  {q:"Warna bendera?", a:["Merah Putih","Biru"], benar:"Merah Putih"}
];

// JOIN
function join(){
  let namaInput = document.getElementById("nama").value;

  console.log("JOIN:", namaInput);

  if(!namaInput) return alert("Isi nama!");

  nama = namaInput;

  db.ref("players/"+nama).set({score:0});

  alert("Berhasil masuk lobby!");
}

// REALTIME PLAYER (FIX ERROR NULL)
db.ref("players").on("value", snap=>{
  const data = snap.val();
  const list = document.getElementById("players");
  list.innerHTML = "";

  if(!data) return; // 🔥 FIX PENTING

  for(let p in data){
    const li = document.createElement("li");
    li.innerText = p;
    list.appendChild(li);
  }
});

// START GAME
function startGame(){
  if(!db){
    alert("Database belum siap!");
    return;
  }

  db.ref("game").set({start:true});
}

// LISTEN START
db.ref("game/start").on("value", snap=>{
  if(snap.val()){
    document.getElementById("lobby").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    tampilSoal();
  }
});

// SOAL
function tampilSoal(){
  if(index >= quiz.length){
    selesai();
    return;
  }

  const soal = quiz[index];
  document.getElementById("pertanyaan").innerText = soal.q;

  const div = document.getElementById("jawaban");
  div.innerHTML = "";

  soal.a.forEach(j=>{
    const btn = document.createElement("button");
    btn.innerText = j;
    btn.onclick = ()=>cek(j);
    div.appendChild(btn);
  });
}

// CEK
function cek(j){
  if(j === quiz[index].benar){
    score += 10;
  }
  index++;
  tampilSoal();
}

// SELESAI
function selesai(){
  db.ref("players/"+nama).update({score:score});

  document.getElementById("game").classList.add("hidden");
  document.getElementById("hasil").classList.remove("hidden");

  db.ref("players").once("value", snap=>{
    let arr = [];
    snap.forEach(c=>{
      arr.push({nama:c.key, ...c.val()});
    });

    arr.sort((a,b)=>b.score-a.score);

    const rank = document.getElementById("ranking");
    rank.innerHTML = "";

    arr.forEach((p,i)=>{
      const li = document.createElement("li");
      li.innerText = (i+1)+". "+p.nama+" - "+p.score;
      rank.appendChild(li);
    });

    if(arr[0].nama === nama){
      document.getElementById("hadiah").classList.remove("hidden");
    }
  });
}
</script>

</body>
</html>
